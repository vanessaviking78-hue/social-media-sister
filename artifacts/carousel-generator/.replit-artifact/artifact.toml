kind = "web"
previewPath = "/"
title = "The Cyber Suite"
version = "1.0.0"
id = "artifacts/carousel-generator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22012

[services.development]
run = "pnpm --filter @workspace/carousel-generator run dev"

[services.production]
publicDir = "artifacts/carousel-generator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22012"
BASE_PATH = "/"
