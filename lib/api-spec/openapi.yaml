openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: carousel
    description: Carousel post generation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /carousel/generate:
    post:
      operationId: generateCarousel
      tags: [carousel]
      summary: Generate carousel posts
      description: Upload photos and a CSV where each row is one post (photo + caption). Returns up to 30 posts.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                photos:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Photo files to cycle through across slides
                csv:
                  type: string
                  format: binary
                  description: CSV file — one row per slide, first column is the caption text
              required:
                - photos
                - csv
      responses:
        "200":
          description: Generated slide list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarouselResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /carousel/image/{sessionId}/{filename}:
    get:
      operationId: getCarouselImage
      tags: [carousel]
      summary: Get uploaded image
      description: Returns a previously uploaded image by session and filename
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Image file
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          description: Image not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /content/before-after-captions:
    post:
      operationId: generateBeforeAfterCaptions
      tags: [content]
      summary: Generate before/after treatment captions
      description: Generate compliance-aware captions and slide labels for before/after treatment photo posts using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                treatments:
                  type: array
                  items:
                    type: object
                    properties:
                      treatmentType:
                        type: string
                      area:
                        type: string
                      notes:
                        type: string
                    required:
                      - treatmentType
                  maxItems: 30
                clientName:
                  type: string
                industry:
                  type: string
                tone:
                  type: string
                extraInstructions:
                  type: string
              required:
                - treatments
      responses:
        "200":
          description: SSE stream with progress events and final results
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    CarouselSlide:
      type: object
      properties:
        slideIndex:
          type: integer
          description: Slide index across all slides (1-based)
        groupPosition:
          type: integer
          description: Position within its carousel post (1 = cover slide, 2-5 = detail slides)
        groupIndex:
          type: integer
          description: Which carousel post this slide belongs to (1-based)
        text:
          type: string
          description: Caption text for this slide
        imageUrl:
          type: string
          description: URL path to the paired photo
        imageName:
          type: string
          description: Original filename of the photo
      required:
        - slideIndex
        - groupPosition
        - groupIndex
        - text
        - imageUrl
        - imageName

    CarouselResult:
      type: object
      properties:
        slides:
          type: array
          items:
            $ref: "#/components/schemas/CarouselSlide"
          description: Generated slides — grouped into carousel posts
        totalSlides:
          type: integer
          description: Total number of slides generated
        slidesPerCarousel:
          type: integer
          description: Number of slides per carousel post
        totalCarousels:
          type: integer
          description: Number of carousel posts
        sessionId:
          type: string
          description: Session ID for referencing uploaded images
      required:
        - slides
        - totalSlides
        - slidesPerCarousel
        - totalCarousels
        - sessionId

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
