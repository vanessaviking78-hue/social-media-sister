openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: carousel
    description: Carousel post generation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /carousel/generate:
    post:
      operationId: generateCarousel
      tags: [carousel]
      summary: Generate carousel posts
      description: Upload photos and a CSV where each row is a carousel post with one column per slide. Returns up to 30 carousel posts.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                photos:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Photo files to use in carousel slides
                csv:
                  type: string
                  format: binary
                  description: CSV file — each row is one carousel post, each column is one slide
              required:
                - photos
                - csv
      responses:
        "200":
          description: Generated carousel posts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarouselResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /carousel/image/{sessionId}/{filename}:
    get:
      operationId: getCarouselImage
      tags: [carousel]
      summary: Get uploaded image
      description: Returns a previously uploaded image by session and filename
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Image file
          content:
            image/*:
              schema:
                type: string
                format: binary
        "404":
          description: Image not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    CarouselSlide:
      type: object
      properties:
        slideIndex:
          type: integer
          description: Slide index within the post (1-based)
        text:
          type: string
          description: Text content for this slide
        imageUrl:
          type: string
          description: URL path to the paired image
        imageName:
          type: string
          description: Original filename of the image
      required:
        - slideIndex
        - text
        - imageUrl
        - imageName

    CarouselPost:
      type: object
      properties:
        postIndex:
          type: integer
          description: Post index (1-30)
        slides:
          type: array
          items:
            $ref: "#/components/schemas/CarouselSlide"
          description: Slides within this carousel post
      required:
        - postIndex
        - slides

    CarouselResult:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/CarouselPost"
          description: Generated carousel posts
        totalPosts:
          type: integer
          description: Total number of carousel posts generated
        slidesPerPost:
          type: integer
          description: Number of slides per carousel post
        sessionId:
          type: string
          description: Session ID for referencing uploaded images
      required:
        - posts
        - totalPosts
        - slidesPerPost
        - sessionId

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
