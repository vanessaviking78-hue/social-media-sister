[build]
  command = "unset NODE_ENV && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/carousel-generator run build"
  publish = "artifacts/carousel-generator/dist/public"

[[redirects]]
  from = "/api/*"
  to = "https://workspaceapi-server-production-0f0d.up.railway.app/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
