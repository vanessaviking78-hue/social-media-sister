[build]
  command = "pnpm --filter @workspace/carousel-generator run build"
  publish = "artifacts/carousel-generator/dist/public"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "development"
  npm_config_user_agent = "pnpm/9.15.9 npm/? node/v20.18.1 linux x64"

[[redirects]]
  from = "/api/*"
  to = "https://workspaceapi-server-production-0f0d.up.railway.app/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
